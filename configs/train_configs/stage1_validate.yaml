model:
  arch: hawk
  model_type: pretrain_llama_v2
  freeze_vit: True
  freeze_qformer: True
  num_query_token: 32
  llama_model: "/home/pia/seoik/hawk/weights/Video-LLaMA-2-7B-Finetuned/llama-2-7b-chat-hf"
  equip_audio_branch: False
  frozen_llama_proj: False
  frozen_video_Qformer: False
  frozen_audio_Qformer: True
  fusion_head_layers: 2
  max_frame_pos: 32
  fusion_header_type: "seqTransf"
  num_video_query_token: 32

datasets:
  webvid:
    data_type: video
    build_info:
      anno_dir: /data/pia/webvid_extracted/annotations/
      videos_dir: /data/pia/webvid_extracted/videos/
    vis_processor:
      train:
        name: "alpro_video_train"
        n_frms: 32
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"
    sample_ratio: 100

run:
  task: video_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 1e-6
  warmup_lr: 1e-6
  weight_decay: 0.05
  # VALIDATION: tiny — checkpoints every epoch so we can test stop/resume quickly
  max_epoch: 3
  batch_size_train: 1
  batch_size_eval: 1
  num_workers: 4
  warmup_steps: 5
  iters_per_epoch: 15

  seed: 42
  output_dir: "/data/pia/stage1_validate"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
